name: oais-do-araguaia-prod

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Roteamento + TLS automático ───────────────────────────────────
  # Descobre frontend/backend pelos labels. Emite e renova o certificado
  # sozinho pelo desafio HTTP-01 no entrypoint `web`.
  traefik:
    image: traefik:v3.3
    restart: always
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=oais_web
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      # Só as faixas da Cloudflare podem ditar X-Forwarded-For. Sem isso o IP
      # real do usuário se perde e a auditoria grava o IP errado.
      # Atualize com scripts/cloudflare-ips.sh.
      - --entrypoints.web.forwardedHeaders.trustedIPs=${CLOUDFLARE_IPS}
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=${CLOUDFLARE_IPS}
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      # Desafio DNS-01, não HTTP-01: atrás do proxy da Cloudflare o desafio
      # HTTP esbarra no "Always Use HTTPS" e em cache. Pelo DNS funciona
      # independente do estado da nuvem laranja.
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      # Para testar sem gastar o limite do Let's Encrypt (5 falhas/hora):
      # descomente, suba, valide, comente de novo e apague o volume
      # traefik_acme antes de emitir o certificado de verdade.
      # - --certificatesresolvers.le.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
      - --log.level=INFO
      - --accesslog=true
      # Métricas para o Prometheus, num entrypoint dedicado (:8082) que NÃO é
      # publicado no host — só o Prometheus, na rede interna, alcança.
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --entrypoints.metrics.address=:8082
    environment:
      # Token da Cloudflare com permissão Zone:DNS:Edit — só para o DNS-01.
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      # Nota: o Traefik crava a API do Docker em 1.24 e ignora DOCKER_API_VERSION.
      # O Docker Engine 29 só aceita a partir da 1.40, então a compatibilidade é
      # resolvida no daemon (DOCKER_MIN_API_VERSION=1.24), não aqui. Ver DEPLOY.md.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    labels:
      # Só definições de middleware — o Traefik não expõe rota própria.
      - traefik.enable=true
      - traefik.http.middlewares.security-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.security-headers.headers.frameDeny=true
      - traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.compress.compress=true
      # Equivale ao limit_req do nginx: 20 req/s por IP, rajada de 40.
      - traefik.http.middlewares.api-ratelimit.ratelimit.average=20
      - traefik.http.middlewares.api-ratelimit.ratelimit.burst=40
      # Equivale ao client_max_body_size 10m do nginx.
      - traefik.http.middlewares.api-bodylimit.buffering.maxRequestBodyBytes=10485760
      - traefik.http.middlewares.api-bodylimit.buffering.memRequestBodyBytes=2097152
      # www → domínio principal.
      - traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\.oasisaraguaia\.com\.br/?(.*)
      - traefik.http.middlewares.www-redirect.redirectregex.replacement=https://oasisaraguaia.com.br/$${1}
      - traefik.http.middlewares.www-redirect.redirectregex.permanent=true
    networks:
      # Entra também na rede interna para o Prometheus raspar traefik:8082.
      - web
      - internal

  backend:
    # Imagem construída e publicada no GHCR pelo CI (.github/workflows/deploy.yml).
    # IMAGE_TAG = SHA do commit no deploy (imutável); default latest.
    image: ghcr.io/lucasrbsouza/oais-backend:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=oais_web
      # Prioridade explícita: sem ela a disputa entre `/` e `/api` depende
      # do tamanho da regra, que é frágil.
      - traefik.http.routers.backend.rule=Host(`oasisaraguaia.com.br`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.priority=100
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=le
      - traefik.http.routers.backend.middlewares=security-headers@docker,compress@docker,api-ratelimit@docker,api-bodylimit@docker
      - traefik.http.services.backend.loadbalancer.server.port=3001
    networks:
      - internal
      - web

  frontend:
    # Imagem do GHCR. O NEXT_PUBLIC_API_URL vai CRAVADO na imagem no build do CI
    # (Variable do repo), não aqui — mudar o domínio exige rebuild no CI.
    image: ghcr.io/lucasrbsouza/oais-frontend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      # O Docker seta HOSTNAME com o id do container e o Next standalone faz
      # bind nele — deixando 127.0.0.1 de fora, o que reprova o healthcheck.
      # Forçar 0.0.0.0 faz o Next escutar em todas as interfaces.
      HOSTNAME: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=oais_web
      - traefik.http.routers.frontend.rule=Host(`oasisaraguaia.com.br`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=le
      - traefik.http.routers.frontend.middlewares=security-headers@docker,compress@docker
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      # Roteador só do www, apontando pro mesmo serviço: o redirect precisa
      # acontecer depois do TLS, e o certificado cobre os dois nomes.
      - traefik.http.routers.www.rule=Host(`www.oasisaraguaia.com.br`)
      - traefik.http.routers.www.entrypoints=websecure
      - traefik.http.routers.www.tls.certresolver=le
      - traefik.http.routers.www.service=frontend
      - traefik.http.routers.www.middlewares=www-redirect@docker
    networks:
      - web

  # ── Observabilidade (Prometheus + Grafana) ────────────────────────
  # Tudo na rede interna. Grafana e Prometheus publicam SÓ em 127.0.0.1 —
  # acesso por túnel SSH (ssh -L 3000:localhost:3000). O Docker fura o ufw ao
  # publicar porta (ver DEPLOY.md §2), então o bind em loopback é o que impede
  # o painel de vazar para a internet. Nenhum serviço de monitoring é exposto
  # pelo Traefik.
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.4.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - internal

  # Métricas do host (CPU, RAM, disco, rede). Precisa enxergar o rootfs.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal

  # Métricas por container (CPU/mem/rede de cada serviço).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    restart: always
    environment:
      # Reusa as credenciais do Postgres. Caracteres especiais na senha
      # precisam de percent-encoding, como no DATABASE_URL.
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  backend_logs:
  traefik_acme:
  prometheus_data:
  grafana_data:

networks:
  # Nomes fixos: o Traefik precisa saber por qual rede falar com o backend,
  # que está em duas. Sem nome fixo o prefixo do projeto entra no meio.
  web:
    name: oais_web
    driver: bridge
  internal:
    name: oais_internal
    driver: bridge
