# Carrega os dashboards versionados em monitoring/grafana/dashboards/.
apiVersion: 1

providers:
  - name: oais
    orgId: 1
    folder: Oásis
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
