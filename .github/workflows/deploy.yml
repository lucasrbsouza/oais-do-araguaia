name: Deploy

# Push na main: testa → builda imagens no GHCR → aguarda aprovação → faz deploy.
# workflow_dispatch com `tag`: pula o build e faz deploy de uma imagem já
# publicada (rollback).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "SHA/tag de imagem já publicada para deploy (rollback). Vazio = builda a partir deste commit."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

# Nunca dois deploys de produção ao mesmo tempo; e não cancela um em andamento.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/oais

jobs:
  # ── Gate: mesma bateria do CI ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - if: matrix.app == 'backend'
        run: npx prisma generate
      - run: npm run lint
      - run: npm test

  # ── Build + push das imagens no GHCR ──────────────────────────────
  # Pulado no rollback (workflow_dispatch com `tag` preenchido).
  build-images:
    needs: test
    if: ${{ github.event.inputs.tag == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:latest
            ${{ env.IMAGE_BASE }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          # NEXT_PUBLIC_API_URL vai CRAVADO na imagem (é ARG de build). Valor
          # vem da Variable do repo — precisa bater com o domínio de produção.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Deploy na VPS (aprovação manual pelo Environment) ─────────────
  deploy:
    needs: [test, build-images]
    # Roda no fluxo normal (build ok) e no rollback (build pulado).
    if: ${{ always() && needs.test.result == 'success' && needs.build-images.result != 'failure' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolver a tag do deploy
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "value=${TAG:-${{ github.sha }}}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            # IMAGE_TAG entra na substituição do compose (${IMAGE_TAG:-latest}).
            export IMAGE_TAG="${{ steps.tag.outputs.value }}"
            cd /opt/oais-do-araguaia
            ./scripts/backup.sh
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
